<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login e Loja</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="login-box" id="loginBox">
            <h1>Login</h1>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="senha" placeholder="Senha">
            <button type="button" id="botaoLogin">Entrar</button>
            <p id="mensagem"></p>
        </div>

        <div class="store-section hidden" id="storeSection">
            <header class="store-header">
                <h1>Bem-vindo à Loja</h1>
                <p>Você está conectado. Aproveite os produtos selecionados.</p>
            </header>
            <main class="store-container">
                <section class="product-card">
                    <h2>Fone Gamer</h2>
                    <p>Som poderoso, design confortável e luz RGB.</p>
                    <button>Comprar</button>
                </section>
                <section class="product-card">
                    <h2>Teclado Mecânico</h2>
                    <p>Precisão e resposta rápida para suas partidas.</p>
                    <button>Comprar</button>
                </section>
                <section class="product-card">
                    <h2>Mouse Ergonômico</h2>
                    <p>Melhor performance com conforto para o dia inteiro.</p>
                    <button>Comprar</button>
                </section>
            </main>
            <footer class="store-footer">
                <button class="logout-button" id="logoutButton">Sair</button>
            </footer>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
